<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Clinfly App Icon -->

  <!-- Background -->
  <rect width="120" height="120" rx="28" fill="#14B8A6"/>

  <!-- Subtle gradient overlay -->
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="28" fill="url(#grad)"/>

  <!-- Medical cross -->
  <rect x="44" y="24" width="32" height="72" rx="6" fill="white"/>
  <rect x="24" y="44" width="72" height="32" rx="6" fill="white"/>

  <!-- Airplane departing from top-right of cross -->
  <g transform="translate(72, 28)">
    <!-- Flight path arc -->
    <path d="M0 8 Q12 -4 24 -8" stroke="white" stroke-width="3" fill="none" opacity="0.5" stroke-linecap="round"/>

    <!-- Airplane -->
    <g transform="translate(20, -10) rotate(-25)">
      <path d="M0 0 L12 -3 L12 3 Z" fill="white" opacity="0.85"/>
      <path d="M4 -1 L4 -6 L7 -1 Z" fill="white" opacity="0.7"/>
      <path d="M4 1 L4 6 L7 1 Z" fill="white" opacity="0.7"/>
    </g>
  </g>
</svg>
